name:                CI 314706016     

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  ci:
    name: Typecheck, Format, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npx prettier --check ".github/workflows/ci_314706016.yaml"

      - name: Test
        run: npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml

      - name: Add test result summary
        if: always() && hashFiles('reports/vitest-junit.xml') != ''
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const xml = fs.readFileSync('reports/vitest-junit.xml', 'utf8');
          const attrs = Object.fromEntries(
            [...xml.matchAll(/\b(tests|failures|errors|skipped|time)="([^"]*)"/g)].map(([, key, value]) => [
              key,
              value,
            ]),
          );

          console.log('## Vitest Test Results');
          console.log('');
          console.log(`- Tests: ${attrs.tests ?? '0'}`);
          console.log(`- Failures: ${attrs.failures ?? '0'}`);
          console.log(`- Errors: ${attrs.errors ?? '0'}`);
          console.log(`- Skipped: ${attrs.skipped ?? '0'}`);
          console.log(`- Duration: ${attrs.time ?? '0'}s`);
          NODE

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always() && hashFiles('reports/vitest-junit.xml') != ''
        with:
          name: Vitest Test Results
          path: reports/vitest-junit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('reports/vitest-junit.xml') != ''
        with:
          name: vitest-junit-report
          path: reports/vitest-junit.xml
